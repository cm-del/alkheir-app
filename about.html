<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عن التطبيق - الخير للدواجن</title>
    <style>
        :root{--bg:#070f0a;--text:#dff5e8;--a:#00e272;--surface:#0e1f14;--border:#1c3424}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;direction:rtl;padding:20px}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:400px;width:100%;text-align:center}
        h2{color:var(--a);margin-bottom:1rem}
        p{color:#4a7a5e;margin-bottom:0.5rem}
        .ver{font-size:0.8rem;color:var(--a);direction:ltr;margin-top:1rem}
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size:3rem;margin-bottom:0.5rem">🐔</div>
        <h2>الخير للدواجن</h2>
        <p>منصة متطورة لإدارة مزارع الدواجن</p>
        <p>النسخة المتقدمة · PWA</p>
        <div class="ver">v2.0.0</div>
        <p style="margin-top:1rem;font-size:0.7rem;">© 2024 جميع الحقوق محفوظة</p>
    </div>
</body>
</html>
