<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>الخير للدواجن - النسخة الخرافية</title>
    <!-- الخطوط والمكتبات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00e272">
    <style>
        /* ===== جميع الـ CSS السابق بالإضافة إلى تحسينات بسيطة ===== */
        :root { --bg: #070f0a; --surface: #0e1f14; --card: #131f18; --card2: #19291f; --a: #00e272; --a2: #ffb703; --a3: #38b6ff; --danger: #ff3b5c; --purple: #b57bee; --text: #dff5e8; --muted: #4a7a5e; --border: #1c3424; --r: 14px; --rs: 10px; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { font-size: 14px; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; direction: rtl; overflow-x: hidden; }
        .hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 300; box-shadow: 0 2px 16px #00000055; }
        .logo-box { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #003d1e, #005a2e); border: 1.5px solid rgba(0,226,114,.5); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 0 14px rgba(0,226,114,.2); }
        .app-name { font-family: 'Tajawal', sans-serif; font-size: .96rem; font-weight: 900; color: var(--a); line-height: 1.1; }
        .app-sub { font-size: .6rem; color: var(--muted); }
        .hdr-r { display: flex; gap: 6px; align-items: center; }
        .chip { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px; font-size: .71rem; cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 4px; transition: border-color .2s; white-space: nowrap; }
        .chip:active { border-color: var(--a); }
        .fbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 7px 12px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; align-items: center; position: sticky; top: 61px; z-index: 200; }
        .fbar::-webkit-scrollbar { display: none; }
        .fp { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: .74rem; font-weight: 700; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all .15s; }
        .fp.active { background: rgba(0,226,114,.14); border-color: var(--a); color: var(--a); }
        .fp-add { background: transparent; border: 1px dashed var(--border); color: var(--muted); padding: 5px 10px; border-radius: 20px; font-size: .76rem; cursor: pointer; font-family: 'Cairo', sans-serif; }
        .hb { background: var(--surface); padding: 6px 12px; border-bottom: 1px solid var(--border); display: none; gap: 5px; overflow-x: auto; scrollbar-width: none; }
        .hb::-webkit-scrollbar { display: none; }
        .hp { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 4px 10px; font-size: .7rem; font-weight: 700; color: var(--muted); cursor: pointer; white-space: nowrap; font-family: 'Cairo', sans-serif; transition: all .15s; }
        .hp.active { background: rgba(56,182,255,.12); border-color: var(--a3); color: var(--a3); }
        .page { display: none; padding: 12px 12px 88px; animation: fu .2s ease; }
        .page.active { display: block; }
        @keyframes fu { from{opacity:0;transform:translateY(5px);} to{opacity:1;transform:translateY(0);} }
        .bnav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(7,1fr); z-index: 300; box-shadow: 0 -2px 16px #00000055; }
        .ni { padding: 6px 2px 9px; display: flex; flex-direction: column; align-items: center; gap: 1px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: 'Cairo', sans-serif; font-size: .54rem; font-weight: 600; transition: color .15s; }
        .ni.active { color: var(--a); }
        .ni-i { font-size: 1.15rem; line-height: 1; }
        .qabar { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; margin-bottom: 12px; padding-bottom: 2px; }
        .qabar::-webkit-scrollbar { display: none; }
        .qa { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 9px 13px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; min-width: 64px; transition: all .15s; flex-shrink: 0; }
        .qa:active { background: rgba(0,226,114,.12); border-color: var(--a); }
        .qa-ic { font-size: 1.4rem; line-height: 1; }
        .qa-lb { font-size: .6rem; color: var(--muted); white-space: nowrap; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 13px; margin-bottom: 11px; }
        .card-title { font-size: .86rem; font-weight: 700; color: var(--a); margin-bottom: 11px; display: flex; align-items: center; gap: 7px; }
        .sg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 11px; }
        .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 11px; text-align: center; }
        .sn { font-size: 1.45rem; font-weight: 900; color: var(--a); line-height: 1.1; font-family: 'Tajawal', sans-serif; }
        .sl { font-size: .62rem; color: var(--muted); margin-top: 2px; }
        .stat.w .sn { color: var(--a2); }
        .stat.b .sn { color: var(--a3); }
        .stat.r .sn { color: var(--danger); }
        .fg { margin-bottom: 9px; }
        .fg label { display: block; font-size: .72rem; color: var(--muted); margin-bottom: 3px; font-weight: 600; }
        .fg input, .fg select, .fg textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--rs); color: var(--text); font-family: 'Cairo', sans-serif; font-size: .85rem; padding: 9px 11px; outline: none; transition: border-color .15s; direction: rtl; -webkit-appearance: none; }
        .fg input:focus, .fg select:focus { border-color: var(--a); }
        .fg select option { background: #131f18; }
        .hint { font-size: .73rem; color: var(--a2); font-weight: 700; margin-top: 4px; padding: 5px 9px; background: rgba(255,183,3,.1); border-radius: 7px; display: inline-block; }
        .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
        .btn { padding: 10px 14px; border: none; border-radius: var(--rs); font-family: 'Cairo', sans-serif; font-size: .85rem; font-weight: 700; cursor: pointer; transition: all .15s; width: 100%; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn:active { transform: scale(.97); }
        .btn-g { background: linear-gradient(135deg, #00e272, #009f4f); color: #050e08; }
        .btn-r { background: linear-gradient(135deg, #ff3b5c, #b0122a); color: #fff; }
        .btn-o { background: linear-gradient(135deg, #ffb703, #d97f00); color: #050e08; }
        .btn-b { background: linear-gradient(135deg, #38b6ff, #0070bb); color: #fff; }
        .btn-p { background: linear-gradient(135deg, #b57bee, #7b2db5); color: #fff; }
        .btn-sm { padding: 5px 10px; font-size: .72rem; width: auto; margin-top: 0; }
        .btn-outline { background: transparent; border: 1px solid var(--a); color: var(--a); }
        .tw { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 9px; }
        table { width: 100%; border-collapse: collapse; font-size: .76rem; }
        th { background: var(--surface); color: var(--a); padding: 8px 7px; text-align: right; font-weight: 700; border-bottom: 1px solid var(--border); white-space: nowrap; }
        td { padding: 8px 7px; border-bottom: 1px solid rgba(28,52,36,.7); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        .dbtn { background: none; border: 1px solid rgba(255,59,92,.35); color: var(--danger); border-radius: 6px; padding: 3px 8px; cursor: pointer; font-size: .68rem; font-family: 'Cairo', sans-serif; }
        .ebtn { background: none; border: 1px solid rgba(56,182,255,.35); color: var(--a3); border-radius: 6px; padding: 3px 8px; cursor: pointer; font-size: .68rem; font-family: 'Cairo', sans-serif; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: .66rem; font-weight: 700; }
        .bg { background: rgba(0,226,114,.12); color: var(--a); border: 1px solid rgba(0,226,114,.25); }
        .by { background: rgba(255,183,3,.12); color: var(--a2); border: 1px solid rgba(255,183,3,.25); }
        .br { background: rgba(255,59,92,.12); color: var(--danger); border: 1px solid rgba(255,59,92,.25); }
        .bb { background: rgba(56,182,255,.12); color: var(--a3); border: 1px solid rgba(56,182,255,.25); }
        .bp { background: rgba(181,123,238,.12); color: var(--purple); border: 1px solid rgba(181,123,238,.25); }
        .pb-w { background: rgba(28,52,36,.6); border-radius: 20px; height: 7px; overflow: hidden; margin-top: 5px; }
        .pb { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--a), #00ff88); transition: width .5s; }
        .mo { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 800; display: none; align-items: flex-end; backdrop-filter: blur(5px); }
        .mo.open { display: flex; }
        .modal { background: var(--card); border-radius: 22px 22px 0 0; padding: 18px; width: 100%; max-height: 92vh; overflow-y: auto; animation: mup .25s cubic-bezier(.3,1.2,.5,1); }
        @keyframes mup { from{transform:translateY(100%);} to{transform:translateY(0);} }
        .mhdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .mtitle { font-size: .93rem; font-weight: 900; color: var(--a); }
        .mx { background: var(--surface); border: none; color: var(--muted); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: .95rem; display: flex; align-items: center; justify-content: center; }
        .alert { background: rgba(255,59,92,.09); border: 1px solid rgba(255,59,92,.25); border-radius: var(--rs); padding: 9px 12px; font-size: .77rem; color: #ff7a8a; margin-bottom: 9px; display: flex; gap: 7px; align-items: flex-start; }
        .ai { background: rgba(56,182,255,.09); border-color: rgba(56,182,255,.25); color: var(--a3); }
        .ao { background: rgba(0,226,114,.09); border-color: rgba(0,226,114,.25); color: var(--a); }
        .itabs { display: flex; gap: 4px; margin-bottom: 11px; overflow-x: auto; scrollbar-width: none; }
        .itabs::-webkit-scrollbar { display: none; }
        .it { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: .7rem; font-weight: 700; color: var(--muted); cursor: pointer; white-space: nowrap; font-family: 'Cairo', sans-serif; transition: all .15s; }
        .it.active { background: rgba(0,226,114,.12); border-color: var(--a); color: var(--a); }
        .wx { background: linear-gradient(135deg, #061728, #0c2415); border: 1px solid var(--border); border-radius: var(--r); padding: 13px; margin-bottom: 11px; }
        .wx-t { font-size: 2rem; font-weight: 900; font-family: 'Tajawal', sans-serif; color: var(--a2); }
        .stock { background: linear-gradient(135deg, rgba(0,226,114,.07), rgba(56,182,255,.04)); border: 1px solid rgba(0,226,114,.18); border-radius: var(--r); padding: 13px; margin-bottom: 11px; display: flex; justify-content: space-between; align-items: center; }
        .stock.low { background: linear-gradient(135deg, rgba(255,59,92,.07), rgba(255,59,92,.03)); border-color: rgba(255,59,92,.25); }
        .fcr { background: linear-gradient(135deg, rgba(0,226,114,.06), rgba(56,182,255,.06)); border: 1px solid rgba(0,226,114,.16); border-radius: var(--r); padding: 13px; margin-bottom: 11px; }
        .trow { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
        .trow:last-child { border-bottom: none; }
        .ttime { font-size: .66rem; color: var(--muted); min-width: 50px; }
        .tok { background: rgba(0,226,114,.14); color: var(--a); padding: 2px 7px; border-radius: 8px; font-size: .67rem; font-weight: 700; }
        .twm { background: rgba(255,183,3,.14); color: var(--a2); padding: 2px 7px; border-radius: 8px; font-size: .67rem; font-weight: 700; }
        .tht { background: rgba(255,59,92,.14); color: var(--danger); padding: 2px 7px; border-radius: 8px; font-size: .67rem; font-weight: 700; }
        .tcl { background: rgba(56,182,255,.14); color: var(--a3); padding: 2px 7px; border-radius: 8px; font-size: .67rem; font-weight: 700; }
        .sc { background: var(--card2); border: 1px solid var(--border); border-radius: var(--rs); padding: 11px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .hi { background: var(--card2); border: 1px solid var(--border); border-radius: var(--rs); padding: 11px; margin-bottom: 8px; }
        .bc { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 13px; margin-bottom: 10px; }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-top: 8px; }
        .photo-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1; background: var(--surface); border: 1px solid var(--border); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .photo-del { position: absolute; top: 4px; left: 4px; background: rgba(255,59,92,.85); border: none; border-radius: 50%; width: 22px; height: 22px; color: #fff; font-size: .8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sec-t { font-size: .9rem; font-weight: 900; color: var(--text); margin: 13px 0 9px; display: flex; align-items: center; gap: 7px; }
        .rb { display: flex; justify-content: space-between; align-items: center; }
        .sep { border-top: 1px solid var(--border); margin: 9px 0; }
        .empty { text-align: center; color: var(--muted); padding: 26px 14px; font-size: .82rem; }
        .pp { color: var(--a); font-weight: 900; }
        .pn { color: var(--danger); font-weight: 900; }
        .chart-w { position: relative; height: 185px; margin-top: 8px; }
        .exp-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .exp-btn { flex: 1; padding: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: var(--rs); font-family: 'Cairo', sans-serif; font-size: .81rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 20px; z-index: 10000; font-weight: 700; background: #00e272; color: #050e08; }
        #pin-lock { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .pin-input { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 15px; text-align: center; font-size: 1.5rem; width: 150px; color: var(--text); letter-spacing: 10px; outline: none; }
        .pin-forgot { color: var(--muted); font-size: .7rem; margin-top: 12px; cursor: pointer; }
        .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; color: var(--text); width: 100%; margin-bottom: 8px; font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body>
    <!-- شاشة القفل -->
    <div id="pin-lock">
        <div class="logo-box" style="width:70px;height:70px;font-size:36px;margin-bottom:20px">🐔</div>
        <div style="font-size:1.2rem;font-weight:bold;margin-bottom:15px;color:var(--a)">الخير للدواجن</div>
        <div id="pin-message" style="color:var(--muted);margin-bottom:15px;font-size:0.85rem">أدخل الرقم السري</div>
        <input type="password" id="pin-input" class="pin-input" maxlength="6" pattern="[0-9]*" inputmode="numeric">
        <button class="btn btn-g" style="width:150px;margin-top:15px" onclick="checkPin()">دخول</button>
        <div id="pin-msg" style="color:var(--danger);margin-top:10px;font-size:0.8rem"></div>
        <div class="pin-forgot" onclick="resetPin()">نسيت الرقم السري؟</div>
    </div>

    <!-- رأس التطبيق -->
    <header class="hdr">
        <div style="display:flex;align-items:center;gap:10px">
            <div class="logo-box">🐔</div>
            <div><div class="app-name">الخير للدواجن</div><div class="app-sub" id="hdrDate"></div></div>
        </div>
        <div class="hdr-r">
            <div class="chip" onclick="showWeatherModal()">🌡 <span id="hdrTemp">--°</span></div>
            <div class="chip" onclick="openModal('export')">📤</div>
        </div>
    </header>
    <div class="fbar" id="farmBar"></div>
    <div class="hb" id="hangarBar"></div>

    <!-- صفحات التطبيق -->
    <div id="page-dash" class="page active">
        <div id="alertZone"></div>
        <div class="qabar" id="quickActions"></div>
        <div id="wxWidget"></div>
        <div class="sg" id="dashStats"></div>
        <div class="card"><div class="card-title">💰 الملخص المالي</div><div class="g2" style="margin-bottom:9px"><div><div style="font-size:.66rem;color:var(--muted)">مبيعات</div><div style="font-size:1rem;font-weight:900;color:var(--a)" id="dInc">--</div></div><div><div style="font-size:.66rem;color:var(--muted)">مصاريف</div><div style="font-size:1rem;font-weight:900;color:var(--danger)" id="dExp">--</div></div></div><div class="sep"></div><div style="font-size:.68rem;color:var(--muted);margin-top:8px">صافي الربح</div><div style="font-size:1.3rem;margin-top:2px" id="dProfit">--</div></div>
        <div class="sec-t">🐔 الدفعات النشطة</div><div id="dashBatches"></div>
    </div>
    <div id="page-hangars" class="page"><div class="sec-t">🏡 المزارع والعنابر</div><div id="farmTree"></div></div>
    <div id="page-store" class="page"><div class="sec-t">🌾 مخزن العلف</div><div id="storeContent"></div></div>
    <div id="page-data" class="page">
        <div class="itabs" id="dataTabs"><button class="it active" onclick="switchDTab('w',this)">⚖️ أوزان</button><button class="it" onclick="switchDTab('f',this)">🌾 علف</button><button class="it" onclick="switchDTab('d',this)">💀 نفوق</button><button class="it" onclick="switchDTab('s',this)">💰 مبيعات</button><button class="it" onclick="switchDTab('e',this)">📋 مصاريف</button><button class="it" onclick="switchDTab('st',this)">👥 عمالة</button></div>
        <input class="search-box" type="text" placeholder="🔍 بحث سريع..." id="dataSearch" oninput="renderDTab()">
        <div id="dataContent"></div>
    </div>
    <div id="page-temp" class="page">
        <div class="itabs"><button class="it active" onclick="switchTTab('log',this)">🌡 سجل الحرارة</button><button class="it" onclick="switchTTab('vent',this)">💨 التهوية</button></div>
        <div id="tempContent"></div>
    </div>
    <div id="page-ref" class="page">
        <div class="itabs"><button class="it active" onclick="switchRefTab('disease',this)">🦠 أمراض</button><button class="it" onclick="switchRefTab('analytics',this)">📊 تحليلات</button></div>
        <div id="refContent"></div>
    </div>
    <div id="page-more" class="page">
        <div class="itabs"><button class="it active" onclick="switchMoreTab('photos',this)">📷 صور</button><button class="it" onclick="switchMoreTab('agenda',this)">📅 أجندة</button><button class="it" onclick="switchMoreTab('clients',this)">👥 عملاء</button><button class="it" onclick="switchMoreTab('market',this)">📈 أسعار</button></div>
        <div id="moreContent"></div>
        <div style="margin-top:20px"><button class="btn btn-outline" id="installBtn" style="display:none" onclick="installPWA()">📲 تثبيت التطبيق</button></div>
    </div>

    <!-- شريط التنقل السفلي -->
    <nav class="bnav">
        <button class="ni active" onclick="showPage('dash',this)"><span class="ni-i">📊</span>الرئيسية</button>
        <button class="ni" onclick="showPage('hangars',this)"><span class="ni-i">🏚</span>العنابر</button>
        <button class="ni" onclick="showPage('store',this)"><span class="ni-i">🌾</span>المخزن</button>
        <button class="ni" onclick="showPage('data',this)"><span class="ni-i">📋</span>البيانات</button>
        <button class="ni" onclick="showPage('temp',this)"><span class="ni-i">🌡</span>الحرارة</button>
        <button class="ni" onclick="showPage('ref',this)"><span class="ni-i">📚</span>المرجع</button>
        <button class="ni" onclick="showPage('more',this)"><span class="ni-i">➕</span>المزيد</button>
    </nav>

    <!-- المودالات (جميعها كما هي) -->
    <!-- ... -->

    <script>
        // ==================== قاعدة البيانات ====================
        var DB = JSON.parse(localStorage.getItem('akh_v9') || JSON.stringify({
            farms: [], hangars: [], batches: [], weights: [], feed: [], deaths: [], sales: [], expenses: [],
            feedStore: [], staff: [], tempLogs: [], photos: [], equipment: [], marketPrices: [], clients: [],
            clientSales: [], agenda: []
        }));
        ['feedStore','staff','tempLogs','photos','equipment','marketPrices','clients','clientSales','agenda'].forEach(k => { if (!DB[k]) DB[k] = []; });
        var KPB = 50, cFarm = null, cHangar = null, cDTab = 'w', cTTab = 'log', cRefTab = 'disease', cMoreTab = 'photos', cReg = '30.06,31.25';
        var wxRegCache = {}, _aHF = null, _aBH = null, _aSF = null;
        function save() { try { localStorage.setItem('akh_v9', JSON.stringify(DB)); } catch(e) { alert('تخزين ممتلئ!'); } }
        function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
        function todayS() { return new Date().toISOString().split('T')[0]; }
        function nowT() { return new Date().toTimeString().slice(0,5); }
        function fmt(n) { return Number(n||0).toLocaleString('ar-EG'); }
        function fD(d) { if(!d) return ''; try { return new Date(d+'T12:00:00').toLocaleDateString('ar-EG',{day:'numeric',month:'short'}); } catch(e) { return d; } }
        function dAge(d) { return Math.max(0, Math.floor((Date.now() - new Date(d+'T12:00:00'))/86400000)); }
        function fridays(d) { var s = new Date(d+'T12:00:00'), n = new Date(), c = 0; while(s.getDay()!==5) s.setDate(s.getDate()+1); while(s <= n) { c++; s.setDate(s.getDate()+7); } return c; }
        function autoPeriod() { var h = new Date().getHours(); return h<12 ? 'morning' : h<18 ? 'afternoon' : 'night'; }
        function periodLabel(p) { return p==='morning' ? '🌅 صباح' : p==='afternoon' ? '☀️ نهار' : '🌙 ليل'; }
        function idealRec(a) { if(a<=7) return {mn:32,mx:35,hn:55,hx:65}; if(a<=14) return {mn:29,mx:32,hn:55,hx:65}; if(a<=21) return {mn:26,mx:29,hn:55,hx:70}; if(a<=28) return {mn:23,mx:26,hn:55,hx:70}; return {mn:20,mx:24,hn:55,hx:75}; }

        // ==================== PIN ====================
        const STORED_PIN_KEY = 'akh_pin';
        let pinVerified = false;
        function getStoredPin() { return localStorage.getItem(STORED_PIN_KEY); }
        function setStoredPin(pin) { localStorage.setItem(STORED_PIN_KEY, pin); }
        function checkPin() {
            const pinInput = document.getElementById('pin-input');
            const pin = pinInput.value.trim();
            const stored = getStoredPin();
            if (!stored) {
                if (pin.length < 4) { document.getElementById('pin-msg').textContent = 'يجب أن يكون 4 أرقام على الأقل'; return; }
                setStoredPin(pin);
                document.getElementById('pin-lock').style.display = 'none';
                pinVerified = true;
                showToast('تم تعيين الرقم السري بنجاح');
                initApp();
            } else {
                if (pin === stored) {
                    pinVerified = true;
                    document.getElementById('pin-lock').style.display = 'none';
                    initApp();
                } else {
                    document.getElementById('pin-msg').textContent = 'رقم سري خطأ';
                    pinInput.value = '';
                }
            }
        }
        function resetPin() {
            if (confirm('سيؤدي هذا إلى حذف جميع البيانات وإعادة ضبط التطبيق. هل أنت متأكد؟')) {
                localStorage.removeItem('akh_v9');
                localStorage.removeItem(STORED_PIN_KEY);
                idbKeyval.clear();
                alert('تم مسح البيانات. سيتم إعادة تحميل الصفحة.');
                location.reload();

        // ==================== Toast & Validation ====================
        function showToast(msg, type='success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            if(type === 'error') toast.style.background = '#ff3b5c';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        function validateNumber(id, allowZero = false) {
            const el = document.getElementById(id);
            const val = el.value.trim();
            if(val === '' || isNaN(val)) { alert('الرجاء إدخال رقم صحيح'); el.focus(); return false; }
            const num = Number(val);
            if(!allowZero && num <= 0) { alert('القيمة يجب أن تكون أكبر من صفر'); el.focus(); return false; }
            if(num < 0) { alert('القيمة لا يمكن أن تكون سالبة'); el.focus(); return false; }
            return true;
        }

        // ==================== Backup / Restore ====================
        function exportBackup() {
            const backup = { version: 'akh_v9', data: DB, exportedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'alkheir_backup_' + todayS() + '.json';
            a.click();
            URL.revokeObjectURL(url);
            closeModal('export');
            showToast('تم تصدير النسخة الاحتياطية');
        }
        function importBackupPrompt() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const backup = JSON.parse(ev.target.result);
                        if(!backup.data || !backup.data.farms) throw new Error('ملف غير صالح');
                        if(!confirm('سيتم استبدال جميع البيانات الحالية. هل أنت متأكد؟')) return;
                        DB = backup.data;
                        save();
                        alert('تمت الاستعادة بنجاح. سيتم تحديث الصفحة.');
                        location.reload();
                    } catch(e) {
                        alert('ملف النسخة الاحتياطية غير صالح');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ==================== photos IndexedDB ====================
        async function savePhoto() {
            const file = document.getElementById('ph-file').files[0];
            if (!file) { alert('اختر صورة'); return; }
            const reader = new FileReader();
            reader.onload = async function(e) {
                const photoId = uid();
                const photoObj = {
                    id: photoId,
                    src: e.target.result,
                    cat: document.getElementById('ph-cat').value,
                    batchId: document.getElementById('ph-b').value,
                    note: document.getElementById('ph-note').value,
                    date: todayS()
                };
                await idbKeyval.set('photo_' + photoId, photoObj);
                DB.photos.push({ id: photoId, cat: photoObj.cat, batchId: photoObj.batchId, note: photoObj.note, date: photoObj.date });
                save();
                closeModal('addPhoto');
                document.getElementById('ph-file').value = '';
                document.getElementById('ph-preview').style.display = 'none';
                showToast('تم حفظ الصورة');
                renderMore();
            };
            reader.readAsDataURL(file);
        }
        async function loadPhotos() {
            const photoRefs = DB.photos.slice().reverse();
            const grid = document.getElementById('photo-grid');
            if (!grid) return;
            grid.innerHTML = '';
            for (const ref of photoRefs) {
                const photoObj = await idbKeyval.get('photo_' + ref.id);
                if (photoObj) {
                    const div = document.createElement('div');
                    div.className = 'photo-item';
                    div.innerHTML = `<img src="${photoObj.src}" onclick="window.open('${photoObj.src}')" style="cursor:pointer"><button class="photo-del" onclick="deletePhoto('${ref.id}')">×</button>`;
                    grid.appendChild(div);
                }
            }
            if (photoRefs.length === 0) {
                grid.innerHTML = '<div class="empty" style="grid-column:1/-1">لا صور</div>';
            }
        }
        async function deletePhoto(id) {
            if (!confirm('حذف الصورة؟')) return;
            await idbKeyval.del('photo_' + id);
            DB.photos = DB.photos.filter(p => p.id !== id);
            save();
            renderMore();
            showToast('تم حذف الصورة');
        }

        function switchDTab(t, btn) { cDTab = t; document.querySelectorAll('#dataTabs .it').forEach(b => b.classList.remove('active')); if(btn) btn.classList.add('active'); renderDTab(); }
        function renderDTab() {
            var el = document.getElementById('dataContent');
            if (!el) return;
            var bids = sBids();
            var searchTerm = document.getElementById('dataSearch')?.value?.toLowerCase() || '';
            var h = '';
            if (cDTab === 'w') {
                h += '<button class="btn btn-g" onclick="openModal(\'addWeight\');fillBS(\'wt-b\');document.getElementById(\'wt-d\').value=todayS();">+ وزن</button>';
                var rows = DB.weights.filter(w => bids.includes(w.batchId)).filter(w => !searchTerm || (DB.batches.find(b=>b.id===w.batchId)?.name||'').includes(searchTerm) || w.date.includes(searchTerm) || String(w.weight).includes(searchTerm)).sort((a,b)=>b.date>a.date?1:-1);

                rows.forEach(w => { var b = DB.batches.find(x=>x.id===w.batchId); h += '<tr><td>'+ (b?b.name:'-') +'</td><td style="color:var(--a);font-weight:700">'+ w.weight +' كجم</td><td>'+ fD(w.date) +'</td><td><button class="dbtn" onclick="delRec(\'weights\',\''+w.id+'\')">×</button></td></tr>'; });
                h += '</tbody></table></div></div>';
            } else if (cDTab === 'f') {

                h += '</tbody></table></div></div>';
            } else if (cDTab === 'd') {

                var rows = DB.deaths.filter(d => bids.includes(d.batchId)).filter(d => !searchTerm || d.date.includes(searchTerm) || String(d.count).includes(searchTerm)).sort((a,b)=>b.date>a.date?1:-1);

                rows.forEach(d => { var b = DB.batches.find(x=>x.id===d.batchId); h += '<tr><td>'+ (b?b.name:'-') +'</td><td style="color:var(--danger)">'+ d.count +'</td><td>'+ fD(d.date) +'</td><td><button class="dbtn" onclick="delRec(\'deaths\',\''+d.id+'\')">×</button></td></tr>'; });
                h += '</tbody></table></div></div>';
            } else if (cDTab === 's') {
                h += '<button class="btn btn-o" onclick="openModal(\'addSale\');fillBS(\'sl-b\');document.getElementById(\'sl-d\').value=todayS();">+ بيع</button>';
                var rows = DB.sales.filter(s => bids.includes(s.batchId)).filter(s => !searchTerm || s.date.includes(searchTerm) || String(s.total).includes(searchTerm)).sort((a,b)=>b.date>a.date?1:-1);

        // ==================== دالة التنبيهات (Notifications) ====================
        function checkAlerts() {
            if (!cFarm) return;
            var st = getFStock(cFarm);
            if (st.bags < 10) {
                showNotification('تحذير مخزن', 'المخزن منخفض: ' + st.bags.toFixed(1) + ' شيكارة');
            }
            var bids = sBids();
            var wa = new Date(); wa.setDate(wa.getDate()-7);
            DB.batches.filter(b=>bids.includes(b.id)&&b.active).forEach(b => {
                var bd = DB.deaths.filter(d=>d.batchId===b.id&&new Date(d.date+'T12:00:00')>=wa).reduce((s,d)=>s+d.count,0);
                if (b.startCount && (bd/b.startCount)*100 >= 3) {
                    showNotification('نفوق مرتفع', b.name + ': تجاوز 3% هذا الأسبوع');
                }
            });
        }
        function showNotification(title, body) {
            if (Notification.permission === 'granted') {
                new Notification(title, { body, icon: 'icon-192.png' });
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') new Notification(title, { body, icon: 'icon-192.png' });
                });
            }
        }
