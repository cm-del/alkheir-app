<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>الخير للدواجن - النسخة المتقدمة</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐔</text></svg>">
    <link rel="manifest" href="manifest.json">
    
    <!-- 3. تحسين سرعة التحميل Preload -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="css/style.css" as="style">
    <link rel="preload" href="css/print.css" as="style" media="print">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;700;900&display=swap"></noscript>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/print.css" media="print">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <!-- 4. وسوم Open Graph للمشاركة -->
    <meta property="og:title" content="الخير للدواجن - النسخة المتقدمة">
    <meta property="og:description" content="منصة متطورة لإدارة مزارع الدواجن">
    <meta property="og:image" content="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>🐔</text></svg>">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#00e272">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <!-- 6. دعم البرنامج المساعد للرسم البياني -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body>

    <!-- 1. شاشة البداية Splash Screen -->
    <div id="splashScreen" style="position:fixed;inset:0;background:#070f0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.6s ease;">
        <div style="font-size:4rem;margin-bottom:1rem;">🐔</div>
        <h2 style="color:#00e272;font-family:'Tajawal',sans-serif;">الخير للدواجن</h2>
        <p style="color:#4a7a5e;margin-top:0.5rem;">جارٍ التحميل...</p>
    </div>

    <header class="hdr">
        <div style="display:flex;align-items:center;gap:10px">
            <div class="logo-box">🐔</div>
            <div><div class="app-name">الخير للدواجن</div><div class="app-sub" id="hdrDate"></div></div>
        </div>
        <div class="hdr-r">
            <!-- 2. زر تثبيت التطبيق PWA (مخفي بإفتراضي) -->
            <button id="installBtn" class="chip" style="display:none;background:var(--a);color:#050e08;border:none;font-weight:600;">📲 تثبيت</button>
            <div class="chip" onclick="Modals.showWeather()">🌡 <span id="hdrTemp">--°</span></div>
            <div class="chip" onclick="Modals.showExport()">📤</div>
            <div class="chip" onclick="UI.toggleLock()">🔒</div>
        </div>
    </header>
    <div class="fbar" id="farmBar"></div>
    <div class="hb" id="hangarBar"></div>

    <div id="page-dash" class="page active"></div>
    <div id="page-hangars" class="page"></div>
    <div id="page-store" class="page"></div>
    <div id="page-data" class="page">
        <div class="itabs" id="dataTabs">
            <button class="it active" onclick="UI.switchDTab('w',this)">⚖️ أوزان</button>
            <button class="it" onclick="UI.switchDTab('f',this)">🌾 علف</button>
            <button class="it" onclick="UI.switchDTab('d',this)">💀 نفوق</button>
            <button class="it" onclick="UI.switchDTab('s',this)">💰 مبيعات</button>
            <button class="it" onclick="UI.switchDTab('e',this)">📋 مصاريف</button>
            <button class="it" onclick="UI.switchDTab('st',this)">👥 عمالة</button>
            <button class="it" onclick="UI.switchDTab('cmp',this)">🔄 مقارنة</button>
        </div>
        <div id="dataContent"></div>
    </div>
    <div id="page-temp" class="page">
        <div class="itabs">
            <button class="it active" onclick="UI.switchTTab('log',this)">🌡 سجل الحرارة</button>
            <button class="it" onclick="UI.switchTTab('vent',this)">💨 التهوية</button>
        </div>
        <div id="tempContent"></div>
    </div>
    <div id="page-ref" class="page">
        <div class="itabs">
            <button class="it active" onclick="UI.switchRefTab('disease',this)">🦠 أمراض</button>
            <button class="it" onclick="UI.switchRefTab('analytics',this)">📊 تحليلات</button>
        </div>
        <div id="refContent"></div>
    </div>
    <div id="page-more" class="page">
        <div class="itabs">
            <button class="it active" onclick="UI.switchMoreTab('photos',this)">📷 صور</button>
            <button class="it" onclick="UI.switchMoreTab('agenda',this)">📅 أجندة</button>
            <button class="it" onclick="UI.switchMoreTab('clients',this)">👥 عملاء</button>
            <button class="it" onclick="UI.switchMoreTab('market',this)">📈 أسعار</button>
            <button class="it" onclick="UI.switchMoreTab('backup',this)">💾 نسخ احتياطي</button>
        </div>
        <div id="moreContent"></div>
    </div>

    <nav class="bnav">
        <button class="ni active" onclick="App.showPage('dash',this)"><span class="ni-i">📊</span>الرئيسية</button>
        <button class="ni" onclick="App.showPage('hangars',this)"><span class="ni-i">🏚</span>العنابر</button>
        <button class="ni" onclick="App.showPage('store',this)"><span class="ni-i">🌾</span>المخزن</button>
        <button class="ni" onclick="App.showPage('data',this)"><span class="ni-i">📋</span>البيانات</button>
        <button class="ni" onclick="App.showPage('temp',this)"><span class="ni-i">🌡</span>الحرارة</button>
        <button class="ni" onclick="App.showPage('ref',this)"><span class="ni-i">📚</span>المرجع</button>
        <button class="ni" onclick="App.showPage('more',this)"><span class="ni-i">➕</span>المزيد</button>
    </nav>

    <!-- 5. رسالة <noscript> -->
    <noscript>
        <div style="background:#ff3b5c;color:white;padding:12px;text-align:center;font-weight:bold;position:fixed;bottom:0;left:0;right:0;z-index:9999;">
            ⚠️ التطبيق يحتاج إلى تفعيل JavaScript ليعمل.
        </div>
    </noscript>

    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/export.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sw-register.js"></script>
    <script src="js/notifications.js"></script>

    <script>
        // 1. إخفاء شاشة البداية بعد 1.5 ثانية
        setTimeout(function() {
            const splash = document.getElementById('splashScreen');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 600);
            }
        }, 1500);

        // 2. التعامل مع زر تثبيت التطبيق
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
            installBtn.addEventListener('click', () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        installBtn.style.display = 'none';
                    }
                    deferredPrompt = null;
                });
            });
        });
        
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
        });
    </script>
</body>
        </html>
